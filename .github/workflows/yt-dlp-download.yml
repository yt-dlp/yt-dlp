name: yt-dlp download (multi-URL, verbose)

on:
  workflow_dispatch:
    inputs:
      urls:
        description: "YouTube URLs (one per line)"
        required: true
      type:
        description: "video or audio"
        required: true
        default: "video"

jobs:
  download:
    runs-on: ubuntu-22.04

    env:
      URLS: ${{ github.event.inputs.urls }}
      TYPE: ${{ github.event.inputs.type }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg --no-install-recommends
          pip install -r requirements.txt

      - name: Check YT_COOKIES secret
        run: |
          if [ -z "${{ secrets.YT_COOKIES }}" ]; then
            echo "❌ YT_COOKIES secret is EMPTY or NOT SET"
            exit 1
          else
            echo "✅ YT_COOKIES secret is set"
          fi

      - name: Write and validate cookies
        run: |
          echo "${{ secrets.YT_COOKIES }}" > cookies.txt
          head -n 1 cookies.txt | grep -q "Netscape" \
            || (echo "❌ Missing Netscape header" && exit 1)

      - name: Download all URLs
        run: |
          set -euxo pipefail
          mkdir -p out

          yt-dlp --version

          URLS_CLEAN=$(echo "$URLS" | tr ',' ' ')

          for URL in $URLS_CLEAN; do
            echo "Downloading: $URL"

            yt-dlp -v \
              --cookies cookies.txt \
              --extractor-args "youtube:player_client=android" \
              --geo-bypass \
              -f "best[height=480]/best[height=720]/best[height=360]/best" \
              -o "out/%(title)s.%(ext)s" \
              "$URL"
          done

      - name: Upload results
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: yt-dlp-output
          path: out/
