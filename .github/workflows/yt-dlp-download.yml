name: yt-dlp download and push

on:
  workflow_dispatch:
    inputs:
      urls:
        description: "YouTube URLs separated by spaces or commas"
        required: true
        type: string

      mode:
        description: "Download mode"
        required: true
        default: audio
        type: choice
        options:
          - audio
          - video

jobs:
  ytdlp:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg git
          python -m pip install --upgrade pip
          pip install -U yt-dlp

      - name: Write cookies
        run: |
          echo "${{ secrets.YT_COOKIES }}" > cookies.txt

          if [ ! -s cookies.txt ]; then
            echo "YT_COOKIES secret is empty"
            exit 1
          fi

      - name: Parse URLs
        shell: bash
        run: |
          INPUT="${{ inputs.urls }}"

          printf '%s\n' "$INPUT" \
            | tr ',' '\n' \
            | tr ' ' '\n' \
            | sed '/^$/d' \
            | sort -u > urls.txt

          echo "URLs:"
          cat urls.txt

      - name: Download media
        shell: bash
        env:
          MODE: ${{ inputs.mode }}
        run: |
          set +e

          mkdir -p downloads
          mkdir -p failed

          NODE_EXE=$(which node)

          SUCCESS_COUNT=0
          FAIL_COUNT=0

          while IFS= read -r url || [ -n "$url" ]; do

            url=$(echo "$url" | xargs)

            [ -z "$url" ] && continue

            echo ""
            echo "======================================"
            echo "Downloading: $url"
            echo "======================================"

            if [ "$MODE" = "audio" ]; then

              yt-dlp \
                --cookies cookies.txt \
                --js-runtimes "node:$NODE_EXE" \
                --remote-components ejs:github \
                --download-archive downloads/archive.txt \
                --restrict-filenames \
                --ignore-errors \
                --continue \
                --no-overwrites \
                --extract-audio \
                --audio-format mp3 \
                --audio-quality 0 \
                -f "bestaudio/best" \
                -o "downloads/audio/%(uploader)s/%(title).200s [%(id)s].%(ext)s" \
                "$url"

            else

              yt-dlp \
                --cookies cookies.txt \
                --js-runtimes "node:$NODE_EXE" \
                --remote-components ejs:github \
                --download-archive downloads/archive.txt \
                --restrict-filenames \
                --ignore-errors \
                --continue \
                --no-overwrites \
                --merge-output-format mp4 \
                -f "bv*+ba/b" \
                -o "downloads/video/%(uploader)s/%(title).200s [%(id)s].%(ext)s" \
                "$url"

            fi

            EXIT_CODE=$?

            if [ "$EXIT_CODE" -eq 0 ]; then
              echo "SUCCESS: $url"
              SUCCESS_COUNT=$((SUCCESS_COUNT+1))
            else
              echo "$url" >> failed/failed_urls.txt
              echo "FAILED: $url"
              FAIL_COUNT=$((FAIL_COUNT+1))
            fi

          done < urls.txt

          echo ""
          echo "========== SUMMARY =========="
          echo "Successful: $SUCCESS_COUNT"
          echo "Failed: $FAIL_COUNT"

      - name: Show downloaded files
        run: |
          echo "Downloaded files:"
          find downloads -type f | sort || true

      - name: Configure git
        run: |
          git config user.name "yt-dlp-bot"
          git config user.email "yt-dlp@bot.local"

      - name: Commit files
        shell: bash
        run: |
          set -e

          TARGET_BRANCH="yt-dlp-downloads"

          git checkout -B "$TARGET_BRANCH"

          git add -f downloads/
          git add -f failed/ || true

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "yt-dlp downloads $(date -u '+%Y-%m-%d %H:%M UTC')"

      - name: Push using PAT
        env:
          REPO_PUSH_TOKEN: ${{ secrets.REPO_PUSH_TOKEN }}
        run: |
          git remote set-url origin \
          https://x-access-token:${REPO_PUSH_TOKEN}@github.com/mostafa-technet/yt-dlp.git

          git push origin yt-dlp-downloads --force
