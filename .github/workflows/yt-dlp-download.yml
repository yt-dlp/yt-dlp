      - name: Download (video/audio)
        env:
          YT_COOKIES: ${{ secrets.YT_COOKIES }}
        run: |
          set -euxo pipefail
          mkdir -p out

          echo "$YT_COOKIES" > cookies.txt
          chmod 600 cookies.txt

          URL="${{ inputs.url }}"
          MODE="${{ inputs.mode }}"

          if [ "$MODE" = "audio" ]; then
            yt-dlp \
              --cookies cookies.txt \
              -x --audio-format mp3 \
              -o "out/%(title)s.%(ext)s" \
              "$URL"
          else
            yt-dlp \
              --cookies cookies.txt \
              -o "out/%(title)s.%(ext)s" \
              "$URL"
          fi
