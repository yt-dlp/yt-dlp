name: yt-dlp multi download and git push

on:
  workflow_dispatch:
    inputs:
      urls:
        description: "Paste one or more YouTube URLs (comma, space or newline separated)"
        required: true
        type: string
      mode:
        description: "Download mode: audio (mp3) or video (mp4)"
        required: true
        default: audio
        type: choice
        options:
          - audio
          - video

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install yt-dlp
        run: |
          python -m pip install --upgrade pip
          pip install -U yt-dlp

      - name: Write cookies.txt from secret
        run: |
          echo "${{ secrets.YT_COOKIES }}" > cookies.txt
          test -s cookies.txt

      - name: Parse URL input (supports comma, space, newline)
        shell: bash
        run: |
          INPUT="${{ inputs.urls }}"
          INPUT="${INPUT//,/ }"
          echo "$INPUT" | tr ' ' '\n' | sed '/^$/d' > urls.txt
          echo "Parsed URLs:"
          cat urls.txt

      - name: Download media (audio or video mode)
        env:
          MODE: ${{ inputs.mode }}
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p downloads
          touch success.txt failure.txt
          NODE_EXE=$(which node)

          base_args=(
            --verbose
            --js-runtimes "node:$NODE_EXE"
            --remote-components ejs:github
            --cookies ./cookies.txt
            --restrict-filenames
            -o "downloads/%(title).200s [%(id)s].%(ext)s"
          )

          while IFS= read -r url || [ -n "$url" ]; do
            url="${url//[$'\r\n']}"
            url="$(echo "$url" | xargs)"
            if [ -z "$url" ]; then continue; fi

            echo "Processing URL: $url"
            yt-dlp "${base_args[@]}" --list-formats "$url"

            if [ "$MODE" = "audio" ]; then
              if yt-dlp "${base_args[@]}" -f "bestaudio/best" --extract-audio --audio-format mp3 --audio-quality 0 "$url"; then
                echo "$url" >> success.txt
              else
                echo "$url" >> failure.txt
              fi
            else
              if yt-dlp "${base_args[@]}" -f "bv*+ba/b" --merge-output-format mp4 "$url"; then
                echo "$url" >> success.txt
              else
                echo "$url" >> failure.txt
              fi
            fi
          done < urls.txt

      - name: Configure Git for pushing files
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      - name: Commit and push downloads to repository branch
        env:
          REPO_PUSH_TOKEN: ${{ secrets.REPO_PUSH_TOKEN }}
          TARGET_BRANCH: "yt-dlp-downloads"
        run: |
          if [ ! -d downloads ]; then
            echo "No downloads directory; nothing to push"
            exit 1
          fi

          git checkout -B "$TARGET_BRANCH"
          git add downloads/
          git commit -m "Add yt-dlp downloads - $(date -u +"%Y-%m-%d %H:%M UTC")" || echo "No changes to commit"
          remote_repo="https://x-access-token:${REPO_PUSH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push "$remote_repo" "$TARGET_BRANCH" --force
