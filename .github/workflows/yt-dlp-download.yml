name: Download YouTube Audio

on: [push]

jobs:
  download_audio:
    runs-on: ubuntu-latest

    steps:
      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Verify YT_COOKIES secret presence and length
        run: |
          secret="${{ secrets.YT_COOKIES }}"
          if [ -z "$secret" ]; then
            echo "Error: Secret YT_COOKIES is empty or not configured."
            exit 1
          else
            echo "YT_COOKIES secret is set."
            echo "Length of YT_COOKIES is ${#secret}"
            echo "$secret" | sha256sum
          fi

      - name: Write cookies file
        run: |
          echo "${{ secrets.YT_COOKIES }}" > cookies.txt
          echo "Cookies file created."

      - name: Install yt-dlp from GitHub master branch
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install git+https://github.com/yt-dlp/yt-dlp.git@master

      - name: Download audio with yt-dlp
        env:
          EJS_RUNNER: node
        run: |
          NODE_BIN_DIR=$(dirname "$(which node)")
          export PATH="$NODE_BIN_DIR:$PATH"
          NODE_EXE=$(which node)
          yt-dlp --verbose \
            --js-runtimes "node:$NODE_EXE" \
            --cookies ./cookies.txt \
            -f bestaudio \
            "https://www.youtube.com/watch?v=IlNwVWwGDpw"

      - name: Upload audio artifact
        uses: actions/upload-artifact@v4
        with:
          name: audio-files
          path: "*.m4a"
