name: yt-dlp download and push

on:
  workflow_dispatch:
    inputs:
      urls:
        description: "YouTube URLs (comma, space or newline separated)"
        required: true
        type: string
      mode:
        description: "Download mode: audio (mp3) or video (mp4)"
        required: true
        default: audio
        type: choice
        options:
          - audio
          - video

permissions:
  contents: write

jobs:
  ytdlp:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg git
          python -m pip install --upgrade pip
          pip install yt-dlp

      - name: Write cookies.txt
        run: |
          echo "${{ secrets.YT_COOKIES }}" > cookies.txt
          if [ ! -s cookies.txt ]; then
            echo "YT_COOKIES secret is missing or empty"
            exit 1
          fi

      - name: Parse URLs
        shell: bash
        run: |
          INPUT="${{ inputs.urls }}"
          printf '%s\n' "$INPUT" | tr ', ' '\n\n' | sed '/^$/d' > urls.txt
          echo "URLs:"
          cat urls.txt

      - name: Download media
        shell: bash
        env:
          MODE: ${{ inputs.mode }}
        run: |
          set -euo pipefail
          mkdir -p downloads
          NODE_EXE=$(which node)

          while IFS= read -r url || [ -n "$url" ]; do
            url=$(echo "$url" | xargs)
            [ -z "$url" ] && continue

            echo "Downloading: $url"

            if [ "$MODE" = "audio" ]; then
              yt-dlp \
                --cookies ./cookies.txt \
                --js-runtimes "node:$NODE_EXE" \
                --remote-components ejs:github \
                --restrict-filenames \
                -o "downloads/%(title).200s [%(id)s].%(ext)s" \
                -f "bestaudio/best" \
                --extract-audio \
                --audio-format mp3 \
                --audio-quality 0 \
                "$url"
            else
              yt-dlp \
                --cookies ./cookies.txt \
                --js-runtimes "node:$NODE_EXE" \
                --remote-components ejs:github \
                --restrict-filenames \
                -o "downloads/%(title).200s [%(id)s].%(ext)s" \
                -f "bv*+ba/b" \
                --merge-output-format mp4 \
                "$url"
            fi
          done < urls.txt

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit and push to yt-dlp-downloads
        shell: bash
        run: |
          set -e

          TARGET_BRANCH="yt-dlp-downloads"

          git checkout -B "$TARGET_BRANCH"

          git add -f downloads/

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "yt-dlp downloads $(date -u '+%Y-%m-%d %H:%M UTC')"

          git push origin "$TARGET_BRANCH" --force
