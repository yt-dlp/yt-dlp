name: yt-dlp download

on:
  workflow_dispatch:
    inputs:
      urls:
        description: "YouTube URLs (separate with space or comma)"
        required: true

jobs:
  download:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node.js (for YouTube JS challenge)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # ---------- 🔒 Cache Python Dependencies ----------
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # ---------- 🧾 Install yt-dlp & ffmpeg ----------
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ---------- 🍪 Prepare cookies ----------
      - name: Prepare cookies
        run: |
          echo "${{ secrets.YT_COOKIES }}" > cookies.txt
          head -n 5 cookies.txt

      # ---------- 🎥 Download Videos ----------
      - name: Download videos
        run: |
          set -euxo pipefail
          URLS="${{ github.event.inputs.urls }}"
          URLS_CLEAN=$(echo "$URLS" | tr ',' ' ')

          for URL in $URLS_CLEAN; do
            echo "Downloading $URL"
            yt-dlp \
              --cookies cookies.txt \
              --geo-bypass \
              --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64)" \
              --extractor-args "youtube:player_client=web" \
              --sleep-interval 3 --max-sleep-interval 7 \
              -f "best[height=480]/best[height=720]/best[height=360]/best" \
              -o "%(title)s.%(ext)s" \
              "$URL"
          done

      # ---------- ☁️ Upload artifacts ----------
      - name: Upload videos
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: downloaded-videos
          path: "*.mp4"
