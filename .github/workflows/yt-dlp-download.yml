name: yt-dlp download with Node.js and Chrome cookies

on: [push]

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Verify Node.js is installed
        run: |
          node -v
          which node

      - name: Install yt-dlp latest from GitHub master
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install --upgrade git+https://github.com/yt-dlp/yt-dlp.git@master

      - name: Write Chrome cookies file from GitHub secret
        run: |
          echo "${{ secrets.YTCOOKIES }}" > ./cookies.txt
          # Optional: print first few lines for debug (remove if you want privacy)
          head -10 ./cookies.txt

      - name: Add Node.js bin dir to PATH in this step
        shell: bash
        run: |
          NODE_BIN_DIR=$(dirname "$(which node)")
          echo "Node bin dir: $NODE_BIN_DIR"
          export PATH="$NODE_BIN_DIR:$PATH"
          
          # Show PATH for debug
          echo "PATH=$PATH"

          # Now run yt-dlp with Node.js enabled and your cookies file
          EJS_RUNNER=node yt-dlp \
            --cookies ./cookies.txt \
            --no-warnings \
            -f bestaudio \
            --print-traffic \
            --no-check-certificate \
            --verbose \
            https://www.youtube.com/watch?v=IlNwVWwGDpw

      - name: Upload audio artifacts
        uses: actions/upload-artifact@v3
        with:
          name: ytdlp-audio
          path: |
            *.m4a
            *.webm
            *.opus
