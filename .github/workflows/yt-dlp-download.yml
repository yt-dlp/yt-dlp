name: Test yt-dlp with explicit Node.js PATH

on:
  workflow_dispatch:
    inputs:
      url:
        description: "YouTube URL"
        required: true

jobs:
  test-node-path:
    runs-on: ubuntu-latest

    steps:
      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install yt-dlp
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -U "yt-dlp @ https://github.com/yt-dlp/yt-dlp/archive/master.tar.gz"

      - name: Run yt-dlp with Node.js in PATH explicitly set
        env:
          EJS_RUNNER: node
        run: |
          set -euxo pipefail

          # Print Node version & binary path
          echo "Node.js version:"
          node -v
          NODE_BIN_DIR=$(dirname "$(which node)")
          echo "Node binary directory: $NODE_BIN_DIR"

          # Explicitly add Node.js bin dir to PATH in the same step
          export PATH="$NODE_BIN_DIR:$PATH"

          echo "Updated PATH: $PATH"

          # Run yt-dlp with simulate flag to verify JS runtime visibility
          yt-dlp -v -f bestaudio --simulate "${{ github.event.inputs.url }}"
