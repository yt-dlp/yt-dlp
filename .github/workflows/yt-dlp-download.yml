name: yt-dlp multi download

on:
  workflow_dispatch:
    inputs:
      urls:
        description: "Paste one or more YouTube URLs, one per line"
        required: true
        type: string
      mode:
        description: "Choose download type"
        required: true
        default: audio
        type: choice
        options:
          - audio
          - video

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install yt-dlp
        run: |
          python -m pip install --upgrade pip
          pip install -U yt-dlp

      - name: Write cookies
        run: |
          echo "${{ secrets.YT_COOKIES }}" > cookies.txt
          echo "cookies.txt written"
          test -s cookies.txt

      - name: Save URL list
        run: |
          cat > urls.txt << 'EOF'
          ${{ inputs.urls }}
          EOF
          echo "URLs received:"
          cat urls.txt

      - name: Show environment diagnostics
        run: |
          which python
          python --version
          which node
          node --version
          which ffmpeg
          ffmpeg -version | head -n 1
          yt-dlp --version

      - name: Download media
        env:
          EJS_RUNNER: node
          MODE: ${{ inputs.mode }}
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p downloads

          NODE_BIN_DIR=$(dirname "$(which node)")
          export PATH="$NODE_BIN_DIR:$PATH"
          NODE_EXE=$(which node)

          echo "Node executable: $NODE_EXE"
          echo "Selected mode: $MODE"

          yt_base_args=(
            --verbose
            --js-runtimes "node:$NODE_EXE"
            --remote-components ejs:github
            --cookies ./cookies.txt
            --restrict-filenames
            --no-playlist
            -o "downloads/%(title).200s [%(id)s].%(ext)s"
          )

          while IFS= read -r url || [ -n "$url" ]; do
            url="$(echo "$url" | xargs)"
            if [ -z "$url" ]; then
              continue
            fi

            echo "========================================"
            echo "Processing URL: $url"
            echo "========================================"

            echo "Listing formats first..."
            yt-dlp "${yt_base_args[@]}" --list-formats "$url"

            if [ "$MODE" = "audio" ]; then
              echo "Downloading best audio and converting to mp3..."
              yt-dlp "${yt_base_args[@]}" \
                -f "bestaudio/best" \
                --extract-audio \
                --audio-format mp3 \
                --audio-quality 0 \
                "$url"
            else
              echo "Downloading best video+audio..."
              yt-dlp "${yt_base_args[@]}" \
                -f "bv*+ba/b" \
                --merge-output-format mp4 \
                "$url"
            fi

          done < urls.txt

      - name: Show downloaded files
        run: |
          echo "Downloaded files:"
          ls -lah downloads || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: yt-dlp-${{ inputs.mode }}-downloads
          path: downloads/
          if-no-files-found: error
