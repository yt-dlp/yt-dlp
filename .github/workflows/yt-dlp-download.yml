name: yt-dlp download and push

on:
  workflow_dispatch:
    inputs:
      urls:
        description: "YouTube URLs (comma, space or newline separated)"
        required: true
        type: string
      mode:
        description: "Download mode: audio (mp3) or video (mp4)"
        required: true
        default: audio
        type: choice
        options:
          - audio
          - video

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: 3.12

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg git

      - name: Install yt-dlp python package
        run: |
          python -m pip install --upgrade pip
          pip install yt-dlp

      - name: Write cookies.txt from secret
        run: |
          echo "${{ secrets.YT_COOKIES }}" > cookies.txt
          test -s cookies.txt

      - name: Parse input URLs
        shell: bash
        run: |
          INPUT="${{ inputs.urls }}"
          INPUT="${INPUT//,/ }"
          echo "$INPUT" | tr ' ' '\n' | sed '/^$/d' > urls.txt

      - name: Download videos/audios
        shell: bash
        env:
          MODE: ${{ inputs.mode }}
        run: |
          set -euo pipefail
          mkdir -p downloads
          NODE_EXE=$(which node)

          base_args=(
            --cookies ./cookies.txt
            --js-runtimes "node:$NODE_EXE"
            --remote-components ejs:github
            --restrict-filenames
            -o "downloads/%(title).200s [%(id)s].%(ext)s"
          )

          while IFS= read -r url || [ -n "$url" ]; do
            url=${url//[$'\r\n']}
            url=$(echo "$url" | xargs)
            if [ -z "$url" ]; then continue; fi

            echo "Downloading $url ..."
            if [[ "$MODE" == "audio" ]]; then
              yt-dlp "${base_args[@]}" -f "bestaudio/best" --extract-audio --audio-format mp3 --audio-quality 0 "$url"
            else
              yt-dlp "${base_args[@]}" -f "bv*+ba/b" --merge-output-format mp4 "$url"
            fi
          done < urls.txt

      - name: Configure git user
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
            - name: Commit and push downloads
        shell: bash
        env:
          REPO_PUSH_TOKEN: ${{ secrets.REPO_PUSH_TOKEN }}
          TARGET_BRANCH: yt-dlp-downloads
        run: |
          set -e

          # Verify token exists
          if [ -z "$REPO_PUSH_TOKEN" ]; then
            echo "REPO_PUSH_TOKEN secret is missing!"
            exit 1
          fi

          # Create/switch branch
          git checkout -B "$TARGET_BRANCH"

          # Ensure downloads folder exists
          mkdir -p downloads

          echo "Git status before add:"
          git status

          # Force add downloads even if ignored
          git add -f downloads/

          echo "Git status after add:"
          git status

          # Commit only if changes exist
          if git diff --cached --quiet; then
            echo "No files to commit"
          else
            git commit -m "Add yt-dlp downloads - $(date -u +"%Y-%m-%d %H:%M UTC")"
          fi

          # Replace origin with PAT-authenticated remote
          git remote remove origin || true
          git remote add origin "https://x-access-token:${REPO_PUSH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          # Push
          git push origin "$TARGET_BRANCH" --force



