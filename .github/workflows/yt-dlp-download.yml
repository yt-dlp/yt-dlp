name: yt-dlp download with cookies

on:
  workflow_dispatch:
  push:

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Verify Node.js
        run: |
          node -v
          which node

      - name: Install yt-dlp (latest)
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install --upgrade git+https://github.com/yt-dlp/yt-dlp.git@master
      - name: Verify YTCOOKIES secret presence
        run: |
          if [ -z "${{ secrets.YTCOOKIES }}" ]; then
            echo "Error: Secret YTCOOKIES is empty or not configured."
            exit 1
          else
            echo "YTCOOKIES secret is set."
            # Optional: print length of secret without revealing content
            echo "Length of YTCOOKIES is ${#{
              secrets.YTCOOKIES
            }}"
            # Or print sha256 hash to confirm unique content is supplied
            echo "${{ secrets.YTCOOKIES }}" | sha256sum
          fi

      - name: Write cookies file
        run: |
          echo "${{ secrets.YTCOOKIES }}" > cookies.txt
          echo "Cookies file created"

      - name: Download audio with yt-dlp
        shell: bash
        run: |
          NODE_BIN_DIR=$(dirname "$(which node)")
          export PATH="$NODE_BIN_DIR:$PATH"

          NODE_EXE=$(which node)

          echo "Using Node runtime: $NODE_EXE"

          EJS_RUNNER=node yt-dlp \
            --cookies ./cookies.txt \
            --js-runtimes node:$NODE_EXE \
            --no-warnings \
            --no-check-certificate \
            --verbose \
            -f bestaudio \
            -o "%(title)s.%(ext)s" \
            https://www.youtube.com/watch?v=IlNwVWwGDpw

      - name: Upload audio artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ytdlp-audio
          path: |
            *.m4a
            *.webm
            *.opus
