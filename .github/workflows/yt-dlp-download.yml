name: yt-dlp download and push

on:
  workflow_dispatch:
    inputs:
      urls:
        description: "YouTube URLs (comma, space or newline separated)"
        required: true
        type: string
      mode:
        description: "Download mode: audio (mp3) or video (mp4)"
        required: true
        default: audio
        type: choice
        options:
          - audio
          - video

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: 3.12

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg git

      - name: Install yt-dlp python package
        run: |
          python -m pip install --upgrade pip
          pip install yt-dlp

      - name: Write cookies.txt from secret
        run: |
          echo "${{ secrets.YT_COOKIES }}" > cookies.txt
          test -s cookies.txt

      - name: Parse input URLs
        shell: bash
        run: |
          INPUT="${{ inputs.urls }}"
          INPUT="${INPUT//,/ }"
          echo "$INPUT" | tr ' ' '\n' | sed '/^$/d' > urls.txt

      - name: Download videos/audios
        shell: bash
        env:
          MODE: ${{ inputs.mode }}
        run: |
          set -euo pipefail
          mkdir -p downloads
          NODE_EXE=$(which node)

          base_args=(
            --cookies ./cookies.txt
            --js-runtimes "node:$NODE_EXE"
            --remote-components ejs:github
            --restrict-filenames
            -o "downloads/%(title).200s [%(id)s].%(ext)s"
          )

          while IFS= read -r url || [ -n "$url" ]; do
            url=${url//[$'\r\n']}
            url=$(echo "$url" | xargs)
            if [ -z "$url" ]; then continue; fi

            echo "Downloading $url ..."
            if [[ "$MODE" == "audio" ]]; then
              yt-dlp "${base_args[@]}" -f "bestaudio/best" --extract-audio --audio-format mp3 --audio-quality 0 "$url"
            else
              yt-dlp "${base_args[@]}" -f "bv*+ba/b" --merge-output-format mp4 "$url"
            fi
          done < urls.txt

      - name: Configure Git for pushing files
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      - name: Commit and push downloads to repository branch
        env:
          REPO_PUSH_TOKEN: ${{ secrets.REPO_PUSH_TOKEN }}
          TARGET_BRANCH: "yt-dlp-downloads"
        run: |
          # Make sure downloads dir exists
          if [ ! -d downloads ]; then
            echo "No downloads directory found; exiting"
            exit 1
          fi

          # Initialize git if needed (already should be in checkout)
          git checkout -B "$TARGET_BRANCH"

          # Add downloaded files, commit with timestamp
          git add downloads/
          git commit -m "Add yt-dlp downloads - $(date -u +"%Y-%m-%d %H:%M UTC")" || echo "Nothing to commit"

          # Push using token authentication
          # Use HTTPS remote url with token inserted
          remote_repo="https://x-access-token:${REPO_PUSH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          git push "$remote_repo" "$TARGET_BRANCH" --force
