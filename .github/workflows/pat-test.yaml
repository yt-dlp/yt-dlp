name: Test PAT Push Access

on:
  workflow_dispatch:

jobs:
  test-pat:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Configure git
        run: |
          git config user.name "pat-test"
          git config user.email "pat@test.com"

      - name: Test PAT authentication
        env:
          REPO_PUSH_TOKEN: ${{ secrets.REPO_PUSH_TOKEN }}
        run: |
          set -e

          git remote set-url origin \
          https://x-access-token:${REPO_PUSH_TOKEN}@github.com/mostafa-technet/yt-dlp.git

          git checkout -B pat-test-branch

          echo "test $(date)" > pat-test.txt

          git add pat-test.txt
          git commit -m "PAT authentication test"

          git push origin pat-test-branch --force
