# PMOVES.YT CHIT Secrets Manifest
#
# This submodule inherits credentials from parent PMOVES.AI.
# See: pmoves/docs/SECRETS.md in parent PMOVES.AI for full documentation.
#
# Credential Loading:
#   source ../PMOVES.AI/pmoves/scripts/bootstrap_credentials.sh
#
# The bootstrap automatically:
#   1. Detects docked vs standalone mode
#   2. Loads CHIT Geometry Packet (env.cgp.json) from parent
#   3. Generates tier-specific environment files
#
# For the full secrets manifest with 100+ entries, see:
#   ../PMOVES.AI/pmoves/chit/secrets_manifest_v2.yaml

version: 2
tier_layout: true
github_sync: true
docker_secrets: true
cgp_file: ../PMOVES.AI/pmoves/data/chit/env.cgp.json

# PMOVES.YT specific secrets - inherits from parent PMOVES.AI
# Only worker tier secrets are relevant for this service
entries:
  # === Worker Tier Secrets (from parent) ===
  # These credentials are loaded from parent PMOVES.AI's CHIT CGP

  - id: qdrant_api_key
    source:
      type: cgp
      label: QDRANT_API_KEY
    targets:
      - file: env.tier-worker
        key: QDRANT_API_KEY
    required: true
    tier: worker

  - id: minio_access_key
    source:
      type: cgp
      label: MINIO_ACCESS_KEY
    targets:
      - file: env.tier-worker
        key: MINIO_ACCESS_KEY
    required: true
    tier: worker

  - id: minio_secret_key
    source:
      type: cgp
      label: MINIO_SECRET_KEY
    targets:
      - file: env.tier-worker
        key: MINIO_SECRET_KEY
    required: true
    tier: worker

  - id: supabase_anon_key
    source:
      type: cgp
      label: SUPABASE_ANON_KEY
    targets:
      - file: env.tier-worker
        key: SUPABASE_ANON_KEY
    required: true
    tier: worker

  - id: supabase_service_key
    source:
      type: cgp
      label: SUPABASE_SERVICE_KEY
    targets:
      - file: env.tier-worker
        key: SUPABASE_SERVICE_KEY
    required: true
    tier: worker

# Note: This is a minimal manifest for PMOVES.YT.
# Parent PMOVES.AI contains the full manifest with 100+ entries
# covering all tiers (agent, llm, media, data, api, worker).
