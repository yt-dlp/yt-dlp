<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Downer</title>
  <link rel="icon" type="image/svg+xml" href="/downer-favicon.svg" />
  <style>
    :root {
      --bg: #eee6d6;
      --surface: #f3ecdd;
      --surface-deep: #efe6d5;
      --text: #1d363a;
      --muted: #4d6670;
      --teal: #06727a;
      --teal-dark: #045d64;
      --edge-light: rgba(255, 251, 242, 0.95);
      --edge-dark: rgba(188, 168, 136, 0.42);
      --edge-dark-inset: rgba(168, 148, 116, 0.45);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px 16px 30px;
    }

    .container { max-width: 1120px; margin: 0 auto; }

    .top-strip {
      height: 20px;
      margin: -24px -16px 28px;
      background: #2f444e;
    }

    .logo-wrap {
      display: grid;
      place-items: center;
      margin-bottom: 28px;
    }

    .logo {
      width: min(620px, 92vw);
      height: auto;
      display: block;
    }

    .subtitle {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 1.05rem;
      text-align: center;
    }

    .card {
      background: var(--surface);
      border-radius: 24px;
      padding: 26px;
      margin-bottom: 22px;
      box-shadow:
        -7px -7px 13px var(--edge-light),
        8px 9px 16px var(--edge-dark);
      border: 1px solid #dccfb8;
    }

    .row { display: flex; gap: 14px; align-items: center; flex-wrap: wrap; }

    .inset {
      background: var(--surface-deep);
      border: 1px solid #ddd0ba;
      box-shadow:
        inset 5px 5px 11px var(--edge-dark-inset),
        inset -6px -6px 11px var(--edge-light);
    }

    input[type="url"], select {
      flex: 1 1 620px;
      min-width: 220px;
      border-radius: 18px;
      padding: 16px 20px;
      font-size: 1.05rem;
      color: var(--text);
      outline: none;
    }

    input[type="url"]:focus,
    select:focus {
      border-color: #4fa0a6;
      box-shadow:
        inset 5px 5px 11px var(--edge-dark-inset),
        inset -6px -6px 11px var(--edge-light),
        0 0 0 2px rgba(8, 123, 132, 0.2);
    }

    .btn {
      border: 0;
      border-radius: 18px;
      padding: 14px 34px;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      color: #fff;
      background: linear-gradient(180deg, #0a7c84 0%, #05656d 100%);
      transform: translateZ(0);
      box-shadow:
        -5px -5px 10px rgba(120, 219, 223, 0.3),
        8px 9px 16px rgba(1, 90, 96, 0.5),
        inset 1px 1px 0 rgba(196, 255, 255, 0.25);
      transition: transform .14s ease, box-shadow .18s ease, filter .15s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      filter: brightness(1.03);
    }

    .btn.is-pressed {
      transform: translateY(1px);
      box-shadow:
        inset 7px 7px 14px rgba(3, 71, 76, 0.58),
        inset -5px -5px 12px rgba(108, 211, 214, 0.22);
    }

    .controls {
      margin-top: 16px;
      display: flex;
      gap: 18px;
      align-items: center;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 1.07rem;
    }

    label.inline { display: inline-flex; align-items: center; gap: 10px; }

    input[type="checkbox"] {
      appearance: none;
      width: 24px;
      height: 24px;
      border-radius: 8px;
      border: 1px solid #d7cab0;
      background: var(--surface-deep);
      box-shadow:
        inset 4px 4px 8px var(--edge-dark-inset),
        inset -4px -4px 8px var(--edge-light);
      position: relative;
      cursor: pointer;
    }

    input[type="checkbox"]:checked {
      background: linear-gradient(180deg, #0f7f86 0%, #045e66 100%);
      box-shadow:
        inset 4px 4px 9px rgba(2, 68, 73, 0.5),
        inset -3px -3px 8px rgba(112, 217, 220, 0.2);
    }

    input[type="checkbox"]:checked::after {
      content: '';
      position: absolute;
      left: 8px;
      top: 5px;
      width: 6px;
      height: 10px;
      border: solid #fff;
      border-width: 0 2px 2px 0;
      transform: rotate(45deg);
    }

    h2 { margin: 0 0 12px; }

    .downloads {
      min-height: 170px;
      border-radius: 18px;
      padding: 14px;
      color: var(--muted);
    }

    .download-item {
      border-radius: 16px;
      padding: 14px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: center;
      animation: reveal .5s cubic-bezier(.21,.9,.25,1);
      box-shadow:
        -6px -6px 11px var(--edge-light),
        7px 8px 13px var(--edge-dark);
      border: 1px solid #ddd1bb;
      background: #f4eddf;
    }

    .download-main { flex: 1; min-width: 0; }

    .download-title {
      margin: 0;
      line-height: 1.35;
      font-size: 1.03rem;
      font-weight: 700;
      color: var(--text);
      display: -webkit-box;
      -webkit-line-clamp: 3;
      line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .download-platform {
      margin-top: 6px;
      color: var(--muted);
      font-size: .95rem;
    }

    .status { margin-top: 12px; min-height: 24px; color: var(--muted); }
    .status.error { color: #b24e48; }

    .footer {
      text-align: center;
      margin-top: 28px;
      color: #706250;
      font-size: .95rem;
    }

    @keyframes reveal {
      from { opacity: 0; transform: translateY(16px) scale(.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @media (max-width: 820px) {
      .download-item { flex-direction: column; align-items: stretch; }
      .download-item .btn { width: 100%; }
      .btn { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="top-strip"></div>
  <div class="container">
    <header class="logo-wrap">
      <img class="logo" src="/downer-logo-final.svg" alt="Downer" />
      <p class="subtitle">Download videos from X or Youtube.</p>
    </header>

    <div class="card">
      <form id="downloadForm">
        <div class="row">
          <input class="inset" id="url" type="url" required placeholder="https://x.com/... or https://www.youtube.com/watch?v=..." />
          <button class="btn" id="loadBtn" type="submit">Download</button>
        </div>
        <div class="controls">
          <label class="inline">Quality:
            <select class="inset" id="format">
              <option value="best" selected>Best Available</option>
              <option value="bestvideo+bestaudio/best">Best Video + Audio</option>
              <option value="worst">Smallest/Lowest</option>
            </select>
          </label>
          <label class="inline"><input id="audioOnly" type="checkbox" /> Audio only</label>
        </div>
      </form>
      <div id="status" class="status"></div>
    </div>

    <div class="card">
      <h2>Downloads</h2>
      <div id="downloads" class="downloads inset">No downloads yet. Paste a URL above to get started.</div>
    </div>

    <p class="footer">(c) downer '26. vibed by cb.</p>
  </div>

  <script>
    const form = document.getElementById('downloadForm');
    const statusEl = document.getElementById('status');
    const downloadsEl = document.getElementById('downloads');
    const pressTimers = new WeakMap();

    const setStatus = (message, isError = false) => {
      statusEl.textContent = message || '';
      statusEl.className = `status${isError ? ' error' : ''}`;
    };

    const pressForFiveSeconds = (button) => {
      if (!button) return;
      button.classList.add('is-pressed');
      const existingTimer = pressTimers.get(button);
      if (existingTimer) clearTimeout(existingTimer);
      const timeout = setTimeout(() => {
        button.classList.remove('is-pressed');
        pressTimers.delete(button);
      }, 5000);
      pressTimers.set(button, timeout);
    };

    const buildQuery = ({ url, format, audio_only, single_video }) => {
      return new URLSearchParams({
        url,
        format,
        audio_only: String(audio_only),
        single_video: String(single_video),
      }).toString();
    };

    const triggerDownload = (params) => {
      const a = document.createElement('a');
      a.href = `/api/fetch?${buildQuery(params)}`;
      a.style.display = 'none';
      document.body.appendChild(a);
      a.click();
      setTimeout(() => a.remove(), 0);
    };

    const addDownload = (data, params) => {
      if (downloadsEl.textContent.includes('No downloads yet')) downloadsEl.innerHTML = '';
      const item = document.createElement('div');
      item.className = 'download-item';
      const title = data.title || data.id || 'Untitled';

      const content = document.createElement('div');
      content.className = 'download-main';
      content.innerHTML = `
        <p class="download-title">${title}</p>
        <div class="download-platform">Platform: ${data.extractor || 'unknown'}</div>
      `;

      const btn = document.createElement('button');
      btn.className = 'btn';
      btn.type = 'button';
      btn.textContent = 'Download again';
      btn.addEventListener('click', () => {
        pressForFiveSeconds(btn);
        triggerDownload(params);
      });

      item.append(content, btn);
      downloadsEl.prepend(item);
    };

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      const loadButton = document.getElementById('loadBtn');
      pressForFiveSeconds(loadButton);

      const params = {
        url: document.getElementById('url').value.trim(),
        format: document.getElementById('format').value,
        audio_only: document.getElementById('audioOnly').checked,
        single_video: true,
      };

      if (!params.url) {
        setStatus('Please paste a valid URL.', true);
        return;
      }

      setStatus('Loading media details and preparing your download...');

      try {
        const response = await fetch(`/api/download?${buildQuery(params)}`);
        const payload = await response.json();

        if (!response.ok) {
          setStatus(payload.error || 'Download failed', true);
          return;
        }

        addDownload(payload, params);
        triggerDownload(params);
        setStatus('Loaded. Your media is ready in Downloads.');
      } catch (error) {
        setStatus(error.message || 'Unexpected error', true);
      }
    });
  </script>
</body>
</html>
